spring:
  flyway:
    table: schema_history
    enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/streamarr
    username: admin
    password: pass
    hikari:
      maximum-pool-size: ${HIKARI_MAXIMUM_POOL_SIZE:30}

  profiles:
    active: dev

  threads:
    virtual:
      enabled: true

dgs:
  graphql:
    graphiql:
      enabled: false
    introspection:
      enabled: false

tmdb:
  api:
    token: ${TMDB_API_TOKEN:}
    cache-size-mb: ${TMDB_API_CACHE_SIZE_MB:200}
    requests-per-second: ${TMDB_API_REQUESTS_PER_SECOND:35}
    request-timeout-seconds: ${TMDB_API_REQUEST_TIMEOUT_SECONDS:30}
  image:
    base-url: ${TMDB_IMAGE_BASE_URL:https://image.tmdb.org/t/p/original}

image:
  storage-path: ${IMAGE_STORAGE_PATH:}

streaming:
  max-concurrent-transcodes: ${STREAMING_MAX_CONCURRENT_TRANSCODES:8}
  segment-duration: ${STREAMING_SEGMENT_DURATION:6s}
  session-timeout: ${STREAMING_SESSION_TIMEOUT:60s}
  session-retention: ${STREAMING_SESSION_RETENTION:24h}
  segment-base-path: ${STREAMING_SEGMENT_BASE_PATH:}
  watch-progress:
    min-resume-percent: ${STREAMING_WATCH_PROGRESS_MIN_RESUME_PERCENT:5.0}
    max-resume-percent: ${STREAMING_WATCH_PROGRESS_MAX_RESUME_PERCENT:90.0}
    max-remaining-seconds: ${STREAMING_WATCH_PROGRESS_MAX_REMAINING_SECONDS:300}

otel:
  sdk:
    disabled: true

library:
  watcher:
    stabilization-period-seconds: ${LIBRARY_WATCHER_STABILIZATION_PERIOD:30}
    poll-interval-seconds: ${LIBRARY_WATCHER_POLL_INTERVAL:5}
    max-wait-seconds: ${LIBRARY_WATCHER_MAX_WAIT:3600}
