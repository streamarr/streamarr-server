spring:
  jpa:
    open-in-view: false
  flyway:
    table: schema_history
    enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/streamarr
    username: admin
    password: pass
    hikari:
      maximum-pool-size: ${HIKARI_MAXIMUM_POOL_SIZE:30}

  threads:
    virtual:
      enabled: true

dgs:
  graphql:
    graphiql:
      enabled: false
    introspection:
      enabled: false

# Web-exposed actuator endpoints are an explicit allowlist: health only. Heap dumps and other
# diagnostics stay off the wire — ADR 0016's in-memory secret handling depends on it.
management:
  endpoints:
    web:
      exposure:
        include: health

tmdb:
  api:
    token: ${TMDB_API_TOKEN:}
    cache-size-mb: ${TMDB_API_CACHE_SIZE_MB:200}
    requests-per-second: ${TMDB_API_REQUESTS_PER_SECOND:35}
    request-timeout-seconds: ${TMDB_API_REQUEST_TIMEOUT_SECONDS:30}
  image:
    base-url: ${TMDB_IMAGE_BASE_URL:https://image.tmdb.org/t/p/original}

image:
  storage-path: ${IMAGE_STORAGE_PATH:}

streaming:
  max-concurrent-transcodes: ${STREAMING_MAX_CONCURRENT_TRANSCODES:8}
  segment-duration: ${STREAMING_SEGMENT_DURATION:6s}
  session-timeout: ${STREAMING_SESSION_TIMEOUT:60s}
  provisioning-timeout: ${STREAMING_PROVISIONING_TIMEOUT:2m}
  transcode-startup-timeout: ${STREAMING_TRANSCODE_STARTUP_TIMEOUT:30s}
  session-retention: ${STREAMING_SESSION_RETENTION:24h}
  segment-base-path: ${STREAMING_SEGMENT_BASE_PATH:}
  distributed:
    enabled: ${STREAMING_DISTRIBUTED_ENABLED:false}
    ca-secret-path: ${STREAMING_DISTRIBUTED_CA_SECRET_PATH:}
    signing-lease: ${STREAMING_DISTRIBUTED_SIGNING_LEASE:30s}
    bootstrap-timeout: ${STREAMING_DISTRIBUTED_BOOTSTRAP_TIMEOUT:2m}
  watch-progress:
    min-played-percent: ${STREAMING_WATCH_PROGRESS_MIN_RESUME_PERCENT:5.0}
    max-played-percent: ${STREAMING_WATCH_PROGRESS_MAX_RESUME_PERCENT:90.0}
    max-remaining-seconds: ${STREAMING_WATCH_PROGRESS_MAX_REMAINING_SECONDS:300}

dev:
  seed-identity: ${DEV_SEED_IDENTITY:true}
  admin-email: ${DEV_ADMIN_EMAIL:admin@dev.local}
  admin-password: ${DEV_ADMIN_PASSWORD:streamarr-dev}

server:
  # Opt-in for reverse-proxied deployments: NATIVE/FRAMEWORK make the login throttle's
  # per-source signal reflect real client addresses instead of the proxy's.
  forward-headers-strategy: ${SERVER_FORWARD_HEADERS_STRATEGY:none}

auth:
  token:
    signing-key: ${AUTH_TOKEN_SIGNING_KEY:}
    verification-keys: ${AUTH_TOKEN_VERIFICATION_KEYS:}
    access-token-ttl: ${AUTH_ACCESS_TOKEN_TTL:10m}
    refresh-token-ttl: ${AUTH_REFRESH_TOKEN_TTL:30d}
    rotation-grace: ${AUTH_ROTATION_GRACE:30s}
  argon2:
    memory-kib: ${AUTH_ARGON2_MEMORY_KIB:19456}
    iterations: ${AUTH_ARGON2_ITERATIONS:2}
    parallelism: ${AUTH_ARGON2_PARALLELISM:1}
  throttle:
    max-attempts: ${AUTH_THROTTLE_MAX_ATTEMPTS:5}
    window: ${AUTH_THROTTLE_WINDOW:15m}
otel:
  sdk:
    disabled: true

library:
  watcher:
    stabilization-period-seconds: ${LIBRARY_WATCHER_STABILIZATION_PERIOD:30}
    poll-interval-seconds: ${LIBRARY_WATCHER_POLL_INTERVAL:5}
    max-wait-seconds: ${LIBRARY_WATCHER_MAX_WAIT:3600}
