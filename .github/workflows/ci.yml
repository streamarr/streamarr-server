name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [ opened, synchronize, reopened ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Buf
        uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1.4.0
        with:
          version: '1.71.0'
          setup_only: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify protobuf compatibility
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          buf format --diff --exit-code
          buf lint --error-format github-actions

          if [[ -z "${BASE_SHA}" ]]; then
            echo "No pull-request base revision; skipping the breaking-change comparison."
            exit 0
          fi

          if git cat-file -e "${BASE_SHA}:buf.yaml" 2>/dev/null; then
            buf breaking \
              --against "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git#format=git,commit=${BASE_SHA}" \
              --error-format github-actions
            exit 0
          fi

          if git ls-tree -r --name-only "${BASE_SHA}" \
              -- streamarr-transcode-contract/src/main/protobuf | grep -q '\.proto$'; then
            echo "::error::The base revision contains protobuf schemas without a Buf configuration"
            exit 1
          fi

          echo "Initial protobuf baseline; no breaking comparison is required."

      - name: Set up JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: '25'
          distribution: 'zulu'
          cache: maven

      - name: Build and test
        run: ./mvnw --batch-mode verify

      - name: Verify aggregate coverage report
        shell: bash
        run: |
          report="streamarr-coverage/target/site/jacoco-aggregate/jacoco.xml"
          if [[ ! -s "${report}" ]]; then
            echo "::error::Aggregate JaCoCo report is missing or empty: ${report}"
            exit 1
          fi

          if ! grep -Fq '<class name="com/streamarr/server/StreamarrServerApplication"' "${report}"; then
            echo "::error::Aggregate JaCoCo report does not contain the server application class"
            exit 1
          fi

          if ! grep -Fq '<class name="com/streamarr/transcode/engine/ffmpeg/FfmpegCommandBuilder"' "${report}"; then
            echo "::error::Aggregate JaCoCo report does not contain the transcode engine"
            exit 1
          fi

          if ! grep -Fq '<class name="com/streamarr/transcode/worker/WorkerGrpcConfiguration"' "${report}"; then
            echo "::error::Aggregate JaCoCo report does not contain the transcode worker"
            exit 1
          fi

          worker_jars=(streamarr-transcode-worker/target/streamarr-transcode-worker-*.jar)
          worker_jar="${worker_jars[0]}"
          if [[ ! -f "${worker_jar}" ]]; then
            echo "::error::Packaged transcode worker artifact is missing"
            exit 1
          fi

          if ! jar tf "${worker_jar}" | grep -E '^BOOT-INF/lib/streamarr-transcode-engine-[^/]+\.jar$' >/dev/null; then
            echo "::error::Packaged transcode worker does not contain the transcode engine"
            exit 1
          fi

          if ! jar tf "${worker_jar}" | grep -E '^BOOT-INF/lib/streamarr-transcode-contract-[^/]+\.jar$' >/dev/null; then
            echo "::error::Packaged transcode worker does not contain the protobuf contract"
            exit 1
          fi

          if ! jar tf "${worker_jar}" | grep -E '^BOOT-INF/lib/grpc-netty-shaded-[^/]+\.jar$' >/dev/null; then
            echo "::error::Packaged transcode worker does not contain shaded Netty"
            exit 1
          fi

          if ! jar tf "${worker_jar}" | grep -E '^BOOT-INF/lib/grpc-services-[^/]+\.jar$' >/dev/null; then
            echo "::error::Packaged transcode worker does not contain gRPC health services"
            exit 1
          fi

          if jar tf "${worker_jar}" | grep -E '^BOOT-INF/lib/(streamarr-server|grpc-netty-[0-9])' >/dev/null; then
            echo "::error::Packaged transcode worker crossed its runtime boundary"
            exit 1
          fi

          server_jars=(streamarr-server/target/streamarr-server-*.jar)
          server_jar="${server_jars[0]}"
          if [[ ! -f "${server_jar}" ]]; then
            echo "::error::Packaged server artifact is missing"
            exit 1
          fi

          if ! jar tf "${server_jar}" | grep -E '^BOOT-INF/lib/streamarr-transcode-engine-[^/]+\.jar$' >/dev/null; then
            echo "::error::Packaged server does not contain the transcode engine"
            exit 1
          fi

          if jar tf "${server_jar}" | grep -E '^BOOT-INF/lib/(streamarr-transcode-(worker|contract)|spring-boot-grpc-server|spring-grpc-core|grpc-services|grpc-netty-shaded)-' >/dev/null; then
            echo "::error::Packaged server contains distributed-worker runtime dependencies"
            exit 1
          fi

      - name: Cache SonarCloud packages
        if: env.SONAR_TOKEN != ''
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarCloud analysis
        if: env.SONAR_TOKEN != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./mvnw --batch-mode org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
