name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [ opened, synchronize, reopened ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          java-version: '25'
          distribution: 'zulu'
          cache: maven

      - name: Set up Buf
        uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1.4.0
        with:
          version: '1.71.0'
          setup_only: true

      - name: Validate Protobuf contract
        run: |
          buf format --diff --exit-code
          buf lint

      - name: Detect breaking Protobuf changes
        if: github.event_name == 'pull_request'
        run: |
          if git ls-tree -r --name-only "${{ github.event.pull_request.base.sha }}" -- src/main/protobuf | grep -q '\.proto$'; then
            git branch --force buf-base "${{ github.event.pull_request.base.sha }}"
            buf breaking --against '.git#branch=buf-base'
          fi

      - name: Build and test
        run: ./mvnw --batch-mode verify

      - name: Cache SonarCloud packages
        if: env.SONAR_TOKEN != ''
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarCloud analysis
        if: env.SONAR_TOKEN != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./mvnw --batch-mode org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
