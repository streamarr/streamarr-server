apiVersion: v1
kind: Service
metadata:
  name: streamarr-server
spec:
  selector:
    app.kubernetes.io/name: streamarr-server
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: worker-grpc
      port: 9090
      targetPort: worker-grpc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamarr-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: streamarr-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: streamarr-server
    spec:
      containers:
        - name: server
          image: streamarr/streamarr-server:latest
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          ports:
            - name: http
              containerPort: 8080
            - name: worker-grpc
              containerPort: 9090
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: streamarr-runtime
                  key: datasource-url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: streamarr-runtime
                  key: datasource-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: streamarr-runtime
                  key: datasource-password
            - name: STREAMING_REMOTE_ENABLED
              value: "true"
            - name: STREAMING_REMOTE_TRUST_DOMAIN
              value: streamarr.example
            - name: STREAMING_REMOTE_SOURCE_NAMESPACE_ID
              value: cccccccc-cccc-cccc-cccc-cccccccccccc
            - name: STREAMING_REMOTE_SOURCE_ROOT
              value: /media
            - name: STREAMING_REMOTE_CERTIFICATE
              value: /run/secrets/streamarr/tls.crt
            - name: STREAMING_REMOTE_PRIVATE_KEY
              value: /run/secrets/streamarr/tls.key
            - name: STREAMING_REMOTE_TRUST_BUNDLE
              value: /run/secrets/streamarr/ca.crt
          volumeMounts:
            - name: media
              mountPath: /media
              readOnly: true
            - name: workload-identity
              mountPath: /run/secrets/streamarr
              readOnly: true
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: streamarr-media
        - name: workload-identity
          csi:
            driver: csi.cert-manager.io
            readOnly: true
            volumeAttributes:
              csi.cert-manager.io/issuer-name: streamarr-ca
              csi.cert-manager.io/issuer-kind: ClusterIssuer
              csi.cert-manager.io/dns-names: streamarr-server,streamarr-server.${POD_NAMESPACE}.svc,streamarr-server.${POD_NAMESPACE}.svc.cluster.local
              csi.cert-manager.io/key-usages: digital signature,key encipherment,server auth
              csi.cert-manager.io/certificate-file: tls.crt
              csi.cert-manager.io/privatekey-file: tls.key
              csi.cert-manager.io/ca-file: ca.crt
              csi.cert-manager.io/fs-group: "1000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamarr-transcode-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: streamarr-transcode-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: streamarr-transcode-worker
    spec:
      containers:
        - name: worker
          image: streamarr/streamarr-server:latest
          command:
            - worker
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          env:
            - name: TRANSCODE_WORKER_CONTROL_PLANE_HOST
              value: streamarr-server
            - name: TRANSCODE_WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: TRANSCODE_WORKER_SOURCE_NAMESPACE_ID
              value: cccccccc-cccc-cccc-cccc-cccccccccccc
            - name: TRANSCODE_WORKER_SOURCE_ROOT
              value: /media
            - name: TRANSCODE_WORKER_SLOTS
              value: "1"
            - name: TRANSCODE_WORKER_TLS_CERTIFICATE
              value: /run/secrets/streamarr/tls.crt
            - name: TRANSCODE_WORKER_TLS_PRIVATE_KEY
              value: /run/secrets/streamarr/tls.key
            - name: TRANSCODE_WORKER_TLS_TRUST_BUNDLE
              value: /run/secrets/streamarr/ca.crt
          volumeMounts:
            - name: media
              mountPath: /media
              readOnly: true
            - name: workload-identity
              mountPath: /run/secrets/streamarr
              readOnly: true
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: streamarr-media
        - name: workload-identity
          csi:
            driver: csi.cert-manager.io
            readOnly: true
            volumeAttributes:
              csi.cert-manager.io/issuer-name: streamarr-ca
              csi.cert-manager.io/issuer-kind: ClusterIssuer
              csi.cert-manager.io/uri-sans: spiffe://streamarr.example/streamarr/worker/${POD_UID}
              csi.cert-manager.io/key-usages: digital signature,key encipherment,client auth
              csi.cert-manager.io/certificate-file: tls.crt
              csi.cert-manager.io/privatekey-file: tls.key
              csi.cert-manager.io/ca-file: ca.crt
              csi.cert-manager.io/fs-group: "1000"
